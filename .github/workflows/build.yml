name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # يمكنك تحديد إصدار Flutter المطلوب هنا
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # استخدام -v للتتبع المفصل (Verbose)
          # Flet سيكتشف Flutter SDK المثبت مسبقاً ولن يطلب تثبيته تفاعلياً
          flet build apk -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: R-plus-apk
          path: build/apk/*.apk
