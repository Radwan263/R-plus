name: Build & Sign R_MediaHunter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Force Kotlin and Rebuild Android
        run: |
          # 1. إبادة المجلد القديم 
          rm -rf android
          rm -f .metadata
          
          # 2. إنشاء مجلد كوتلن جديد
          flutter create --platforms android -a kotlin --org com.radwan --project-name plus .
          
          # 3. تحديث الكوتلن بقوة
          sed -i -E 's/ext\.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle
          sed -i -E 's/id "org\.jetbrains\.kotlin\.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle || true
          
          # 4. النزول للإصدار الذهبي 34 للتطبيق الرئيسي
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 34/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk flutter.targetSdkVersion/targetSdk 34/g' android/app/build.gradle
          
          # 5. الصلاحيات والاسم
          sed -i 's/android:label="plus"/android:label="R_MediaHunter"/g' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>' android/app/src/main/AndroidManifest.xml
          
          # 6. البصمة
          sed -i 's/FlutterActivity/FlutterFragmentActivity/g' android/app/src/main/kotlin/com/radwan/plus/MainActivity.kt
          sed -i 's/import io.flutter.embedding.android.FlutterActivity/import io.flutter.embedding.android.FlutterFragmentActivity/g' android/app/src/main/kotlin/com/radwan/plus/MainActivity.kt

      - name: Clean and Install Dependencies
        run: |
          # تدمير كاش Gradle للتخلص من الكوتلن القديم
          rm -rf ~/.gradle/caches
          rm -f pubspec.lock
          flutter clean
          flutter pub cache clean -f
          flutter pub get

      - name: The Magic Hack (Force SDK 34 on ALL Plugins)
        run: |
          # تعديل مكتبات فلاتر الأساسية المحملة على السيرفر لتجاهل SDK 35
          FLUTTER_DIR=$(dirname $(which flutter))/..
          find $FLUTTER_DIR/packages -name "build.gradle" -exec sed -i 's/compileSdk = 35/compileSdk = 34/g' {} + || true
          
          # تعديل جميع المكتبات التي تم تحميلها من Pub
          find ~/.pub-cache -name "build.gradle" -exec sed -i 's/compileSdk = 35/compileSdk = 34/g' {} + || true
          find ~/.pub-cache -name "build.gradle" -exec sed -i 's/compileSdkVersion 35/compileSdkVersion 34/g' {} + || true
          find ~/.pub-cache -name "build.gradle" -exec sed -i 's/compileSdk 35/compileSdk 34/g' {} + || true

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Sign APK with Custom Digital Key
        run: |
          keytool -genkey -v -keystore r_media_key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias r_media -dname "CN=Radwan, OU=R_Media, O=Radwan, L=Cairo, S=Cairo, C=EG" -storepass Radwan2026 -keypass Radwan2026
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -n 1)
          $APKSIGNER sign --ks r_media_key.jks --ks-key-alias r_media --ks-pass pass:Radwan2026 build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: R_MediaHunter_APK_Signed
          path: build/app/outputs/flutter-apk/app-release.apk
