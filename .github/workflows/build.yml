name: Build & Sign R_MediaHunter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Clean and Rebuild Android Structure
        run: |
          # التأكد من أن compileSdk و targetSdk هما 35 في build.gradle
          sed -i 's/compileSdk .*/compileSdk 35/' android/app/build.gradle
          sed -i 's/targetSdk .*/targetSdk 35/' android/app/build.gradle
          sed -i 's/minSdk .*/minSdk 24/' android/app/build.gradle
          
          # تغيير اسم التطبيق في Manifest
          sed -i 's/android:label=".*"/android:label="R_MediaHunter"/' android/app/src/main/AndroidManifest.xml
          # التأكد من وجود الصلاحيات الأساسية
          grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.WRITE_EXTERNAL_STORAGE" android/app/src/main/AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Sign APK with Custom Digital Key
        run: |
          # توليد مفتاح توقيع رقمي تلقائياً
          keytool -genkey -v -keystore r_media_key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias r_media -dname "CN=Radwan, OU=R_Media, O=Radwan, L=Cairo, S=Cairo, C=EG" -storepass Radwan2026 -keypass Radwan2026
          
          # البحث عن أداة apksigner وتوقيع الملف
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -n 1)
          $APKSIGNER sign --ks r_media_key.jks --ks-key-alias r_media --ks-pass pass:Radwan2026 build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: R_MediaHunter_APK_Signed
          path: build/app/outputs/flutter-apk/app-release.apk
