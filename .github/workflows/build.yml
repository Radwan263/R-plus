name: Build & Sign R_MediaHunter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Force Kotlin and Rebuild Android
        run: |
          # 1. إبادة مجلد الأندرويد وملف الذاكرة المخفي لضمان بناء نظيف
          rm -rf android
          rm -f .metadata
          
          # 2. إجبار فلاتر على بناء مجلد جديد بلغة Kotlin الحديثة
          flutter create --platforms android -a kotlin --org com.radwan --project-name plus .
          
          # 3. ترقية الكوتلن في الإعدادات
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle
          
          # 4. إجبار السيرفر على SDK 35 في التطبيق الرئيسي
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' android/app/build.gradle
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 35/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/g' android/app/build.gradle
          sed -i 's/targetSdk flutter.targetSdkVersion/targetSdk 35/g' android/app/build.gradle
          
          # 5. الحل الجذري: إجبار جميع المكتبات (مثل wakelock_plus) على استخدام SDK 35
          # يتم إضافة كود subprojects في نهاية ملف build.gradle الخاص بالتطبيق
          cat <<EOF >> android/app/build.gradle

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdkVersion 35
                buildToolsVersion "35.0.0"
            }
        }
    }
}
EOF

          # 6. الصلاحيات والاسم
          sed -i 's/android:label="plus"/android:label="R_MediaHunter"/g' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>' android/app/src/main/AndroidManifest.xml
          
          # 7. إعدادات البصمة (FlutterFragmentActivity)
          # بما أننا قمنا بعمل flutter create، نحتاج للتأكد من المسار الصحيح
          MAIN_ACTIVITY_PATH=$(find android/app/src/main/kotlin -name "MainActivity.kt")
          if [ -f "$MAIN_ACTIVITY_PATH" ]; then
            sed -i 's/FlutterActivity/FlutterFragmentActivity/g' "$MAIN_ACTIVITY_PATH"
            sed -i 's/import io.flutter.embedding.android.FlutterActivity/import io.flutter.embedding.android.FlutterFragmentActivity/g' "$MAIN_ACTIVITY_PATH"
          fi

      - name: Clean and Install Dependencies
        run: |
          rm -f pubspec.lock
          flutter clean
          flutter pub cache clean -f
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Sign APK with Custom Digital Key
        run: |
          keytool -genkey -v -keystore r_media_key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias r_media -dname "CN=Radwan, OU=R_Media, O=Radwan, L=Cairo, S=Cairo, C=EG" -storepass Radwan2026 -keypass Radwan2026
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -n 1)
          $APKSIGNER sign --ks r_media_key.jks --ks-key-alias r_media --ks-pass pass:Radwan2026 build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: R_MediaHunter_APK_Signed
          path: build/app/outputs/flutter-apk/app-release.apk
